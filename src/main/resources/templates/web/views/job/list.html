<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Todo List</title>

    <link rel="stylesheet" th:href="@{/css/list.css}">
</head>
<body>
<div class="container">
    <div class="top-bar">

        <h1>Todo List</h1>

        <div class="toolbar">

            <!-- Search -->
            <form th:action="@{/job/search}" method="get" class="search-form">
                <input
                        type="text"
                        name="keyword"
                        th:value="${keyword}"
                        placeholder="🔍 Search by title..."
                />

                <button type="submit" class="btn btn-primary">
                    Search
                </button>
            </form>

            <!-- Filter -->
            <form th:action="@{/job/filter}" method="get" class="filter-form">

                <select name="status">
                    <option value="">All Status</option>

                    <option value="true" th:selected="${status == 'true'}">
                        Completed
                    </option>

                    <option value="false" th:selected="${status == 'false'}">
                        In Progress
                    </option>
                </select>

                <button type="submit" class="btn btn-primary">
                    Filter
                </button>

            </form>

            <!-- Buttons -->
            <div class="action-buttons">
                <a th:href="@{/}" class="btn btn-secondary">🏠 Home</a>
                <a th:href="@{/job/add}" class="btn btn-primary">+ New Job</a>
            </div>

        </div>

    </div>

    <table class="todo-table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Description</th>
            <th>Start Date</th>
            <th>End Date</th>
            <th>Status</th>
            <th width="180">Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:if="${#lists.isEmpty(jobs)}">
            <td colspan="7" class="empty">
                No jobs found.
            </td>
        </tr>

        <tr th:each="job : ${jobs}">

            <td th:text="${job.id}"></td>

            <td th:text="${job.title}"></td>

            <td th:text="${job.description}"></td>

            <td th:text="${job.startDate != null ? #temporals.format(job.startDate, 'dd-MM-yyyy') : 'N/A'}"></td>

            <td th:text="${job.endDate != null ? #temporals.format(job.endDate, 'dd-MM-yyyy') : 'N/A'}"></td>

            <td>
                <span th:if="${job.status}" class="status completed">
                    Completed
                </span>

                <span th:unless="${job.status}" class="status pending">
                    In Progress
                </span>
            </td>

            <td>

                <a th:href="@{/job/edit/{id}(id=${job.id})}"
                   class="btn btn-warning">
                    Edit
                </a>

                <a th:href="@{/job/delete/{id}(id=${job.id})}"
                   class="btn btn-danger">
                    Delete
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
